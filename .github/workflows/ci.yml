name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify repository hygiene
        shell: bash
        run: |
          if ls *.class 1> /dev/null 2>&1; then
            echo "Error: .class files found in repository root"
            exit 1
          fi

      - name: Verify on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: ./gradlew --no-daemon clean check architectureTest integrationTest

      - name: Verify on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat --no-daemon clean check architectureTest integrationTest

      - name: Run UI tests on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: ./gradlew --no-daemon uiTest

      - name: Run UI tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat --no-daemon uiTest

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-reports-${{ matrix.os }}
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn
