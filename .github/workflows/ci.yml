name: CI

on:
  push:
    branches: [ "main", "remediation-fixes" ]
  pull_request:
    branches: [ "main", "remediation-fixes" ]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Java 21
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4

      - name: Verify repository hygiene
        shell: bash
        run: |
          FORBIDDEN=$(git ls-files | grep -E '\.class$|\.log$|\.tmp$|^\.gradle/|/build/' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "Error: Forbidden tracked files found:"
            echo "$FORBIDDEN"
            exit 1
          fi

      - name: Verify on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: chmod +x gradlew && ./gradlew --no-daemon clean check architectureTest integrationTest

      - name: Verify on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat --no-daemon clean check architectureTest integrationTest

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run UI tests on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a ./gradlew --no-daemon uiTest

      - name: Run UI tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat --no-daemon uiTest

      - name: Upload Test Reports
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        if: always()
        with:
          name: verification-reports-${{ matrix.os }}
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn
