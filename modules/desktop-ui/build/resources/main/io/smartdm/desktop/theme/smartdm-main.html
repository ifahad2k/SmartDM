<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartDM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================= TOKENS ============================= */
:root{
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --radius-sm:6px; --radius-md:10px; --radius-lg:16px; --radius-xl:20px;
  --dur-fast:120ms; --dur-med:220ms; --ease:cubic-bezier(.4,0,.2,1);
}

/* ---- Dark glass+neon (default) ---- */
[data-theme="dark"]{
  --wallpaper: radial-gradient(circle at 15% 15%, rgba(123,92,255,.35), transparent 40%),
               radial-gradient(circle at 85% 20%, rgba(0,229,255,.28), transparent 42%),
               radial-gradient(circle at 70% 85%, rgba(255,61,203,.24), transparent 45%),
               radial-gradient(circle at 20% 80%, rgba(55,233,178,.18), transparent 40%),
               linear-gradient(160deg,#0A0B12,#120E1C 55%,#0A0C16);
  --glass:rgba(255,255,255,.055);
  --glass-strong:rgba(255,255,255,.09);
  --glass-border:rgba(255,255,255,.14);
  --glass-border-strong:rgba(255,255,255,.24);
  --surface-hover:rgba(255,255,255,.09);
  --surface-active:rgba(255,255,255,.13);
  --text-primary:#F3F5FC;
  --text-secondary:#A6ADC4;
  --text-tertiary:#767E96;
  --neon-cyan:#37E9FF;
  --neon-magenta:#FF3DCB;
  --neon-violet:#9B6BFF;
  --neon-amber:#FFC24B;
  --neon-mint:#3CFFC4;
  --neon-danger:#FF4D6A;
  --accent:var(--neon-cyan);
  --accent-contrast:#04141A;
  --focus-ring:var(--neon-cyan);
  --scrim:rgba(4,5,10,.65);
  --blur:22px;
  --glow-op:.55;
}

/* ---- Light glass+neon (visually consistent with dark) ---- */
[data-theme="light"]{
  --wallpaper: radial-gradient(circle at 15% 10%, rgba(123,92,255,.22), transparent 42%),
               radial-gradient(circle at 88% 18%, rgba(0,184,217,.20), transparent 44%),
               radial-gradient(circle at 75% 90%, rgba(230,25,176,.16), transparent 46%),
               radial-gradient(circle at 15% 85%, rgba(18,196,139,.16), transparent 42%),
               linear-gradient(160deg,#EDEFF9,#F4EEFB 55%,#EAF3FB);
  --glass:rgba(255,255,255,.55);
  --glass-strong:rgba(255,255,255,.78);
  --glass-border:rgba(255,255,255,.75);
  --glass-border-strong:rgba(30,20,60,.14);
  --surface-hover:rgba(255,255,255,.85);
  --surface-active:rgba(255,255,255,.95);
  --text-primary:#181A26;
  --text-secondary:#565D74;
  --text-tertiary:#7C8299;
  --neon-cyan:#00A8C2;
  --neon-magenta:#D611A8;
  --neon-violet:#6B3FE0;
  --neon-amber:#C97A00;
  --neon-mint:#0EAE83;
  --neon-danger:#DA324B;
  --accent:var(--neon-cyan);
  --accent-contrast:#FFFFFF;
  --focus-ring:var(--neon-violet);
  --scrim:rgba(60,64,90,.28);
  --blur:22px;
  --glow-op:.28;
}

/* ---- High contrast (accessibility fallback — glow/blur disabled) ---- */
[data-theme="hc"]{
  --wallpaper:#000000;
  --glass:#000000;
  --glass-strong:#0A0A0A;
  --glass-border:#FFFFFF;
  --glass-border-strong:#FFFFFF;
  --surface-hover:#1A1A1A;
  --surface-active:#242424;
  --text-primary:#FFFFFF;
  --text-secondary:#F2F2F2;
  --text-tertiary:#D0D0D0;
  --neon-cyan:#FFD400; --neon-magenta:#FF63E0; --neon-violet:#00E5FF; --neon-amber:#FFD400; --neon-mint:#00FFA6; --neon-danger:#FF6B6B;
  --accent:#FFD400; --accent-contrast:#000000; --focus-ring:#FFD400; --scrim:rgba(0,0,0,.85);
  --blur:0px; --glow-op:0;
}
[data-theme="hc"] .glass{ backdrop-filter:none !important; box-shadow:none !important; border-width:2px !important; }
[data-theme="hc"] .aurora{ display:none; }
[data-theme="hc"] .neon-text, [data-theme="hc"] .brand-mark{ text-shadow:none !important; box-shadow:none !important; }

[data-density="comfortable"]{ --row-h:60px; --pad-unit:14px; --font-scale:1; }
[data-density="compact"]{ --row-h:42px; --pad-unit:8px; --font-scale:.92; }

*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  background:var(--wallpaper);
  background-attachment:fixed;
  color:var(--text-primary);
  font-family:var(--font-body);
  font-size:calc(13.5px * var(--font-scale));
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  padding:22px;
}
button, input, select{ font-family:inherit; color:inherit; background:none; border:none; }
::selection{ background:var(--accent); color:var(--accent-contrast); }
:focus-visible{ outline:2px solid var(--focus-ring); outline-offset:2px; border-radius:4px; }
@media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; transition-duration:.001ms !important; } }

/* ambient aurora drift behind the window, dark-mode signature motion */
.aurora{
  position:fixed; inset:-10%; z-index:0; pointer-events:none;
  background:inherit; filter:blur(6px);
  animation:drift 26s ease-in-out infinite alternate;
}
@keyframes drift{ from{ transform:translate(-1.5%,-1%) scale(1);} to{ transform:translate(1.5%,1.5%) scale(1.04);} }

/* ============================= GLASS PRIMITIVE ============================= */
.glass{
  background:var(--glass);
  backdrop-filter:blur(var(--blur)) saturate(170%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(170%);
  border:1px solid var(--glass-border);
}
.neon-text{ text-shadow:0 0 18px currentColor; }

/* ============================= OS WINDOW CHROME ============================= */
.os-window{
  position:relative; z-index:1;
  width:min(1180px, 100%); height:min(760px, 96vh);
  border-radius:var(--radius-xl);
  overflow:hidden;
  display:flex; flex-direction:column;
  background:var(--glass);
  backdrop-filter:blur(var(--blur)) saturate(170%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(170%);
  border:1px solid var(--glass-border);
  box-shadow:
    0 40px 100px rgba(0,0,0,.55),
    0 0 0 1px var(--glass-border-strong),
    0 0 90px calc(var(--glow-op) * 60px) rgba(0,229,255,calc(var(--glow-op) * .35));
}

.titlebar{
  height:40px; flex-shrink:0;
  display:flex; align-items:center;
  padding:0 6px 0 14px;
  gap:8px;
  border-bottom:1px solid var(--glass-border);
  background:var(--glass-strong);
  -webkit-app-region:drag;
}
.titlebar .app-icon{
  width:18px; height:18px;
  background:url('smartdmsvg.svg') no-repeat center center / contain;
  flex-shrink:0;
}
.titlebar .app-title{ font-family:var(--font-display); font-size:12px; font-weight:600; color:var(--text-secondary); letter-spacing:.01em; }
.titlebar-spacer{ flex:1; }
.win-caption{ display:flex; align-items:stretch; height:100%; -webkit-app-region:no-drag; }
.cap-btn{
  width:44px; height:40px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text-secondary); position:relative;
  transition:background var(--dur-fast);
}
.cap-btn:hover{ background:var(--surface-hover); color:var(--text-primary); }
.cap-btn.close:hover{ background:#E81123; color:#fff; }
.cap-btn svg{ width:10px; height:10px; }

/* Windows 11 snap-layout flyout */
.snap-wrap{ position:relative; }
.snap-flyout{
  position:absolute; top:44px; right:0;
  background:var(--glass-strong); backdrop-filter:blur(var(--blur));
  border:1px solid var(--glass-border); border-radius:var(--radius-md);
  padding:10px; display:flex; gap:8px;
  opacity:0; pointer-events:none; transform:translateY(-4px);
  transition:opacity var(--dur-med), transform var(--dur-med);
  box-shadow:0 20px 50px var(--scrim);
  z-index:200;
}
.snap-wrap:hover .snap-flyout{ opacity:1; pointer-events:auto; transform:translateY(0); transition-delay:.35s; }
.snap-mini{
  width:52px; height:38px; border-radius:5px; border:1px solid var(--glass-border-strong);
  background:var(--glass); display:flex; gap:2px; padding:3px; cursor:pointer;
}
.snap-mini span{ background:var(--accent); opacity:.55; border-radius:2px; }
.snap-mini.full span{ flex:1; }
.snap-mini.split span{ flex:1; }
.snap-mini.quad{ flex-wrap:wrap; }
.snap-mini.quad span{ width:calc(50% - 1px); height:calc(50% - 1px); }

/* ============================= APP BODY ============================= */
.app-body{
  flex:1; display:grid;
  grid-template-columns:auto 1fr;
  grid-template-rows:auto 1fr auto;
  grid-template-areas:"rail topbar" "rail main" "rail status";
  overflow:hidden;
}

.nav-rail{
  grid-area:rail; width:80px;
  border-right:1px solid var(--glass-border);
  background:var(--glass);
  display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:2px;
}
.brand{ display:flex; flex-direction:column; align-items:center; gap:6px; padding-bottom:14px; margin-bottom:8px; border-bottom:1px solid var(--glass-border); width:100%; }
.brand-mark{
  width:32px; height:32px;
  background:url('smartdmsvg.svg') no-repeat center center / contain;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:14px; color:#04141A;
  box-shadow:0 0 22px calc(var(--glow-op) * 1px + 14px) rgba(0,229,255,var(--glow-op));
}
.brand-name{ font-family:var(--font-display); font-weight:600; font-size:9.5px; letter-spacing:.08em; color:var(--text-tertiary); }

.nav-item{
  display:flex; flex-direction:column; align-items:center; gap:4px;
  width:64px; padding:9px 4px; border-radius:var(--radius-md);
  cursor:pointer; color:var(--text-secondary); position:relative;
  transition:background var(--dur-fast), color var(--dur-fast);
}
.nav-item svg{ width:17px; height:17px; }
.nav-item .lbl{ font-family:var(--font-display); font-size:9.5px; font-weight:500; }
.nav-item:hover{ background:var(--surface-hover); color:var(--text-primary); }
.nav-item.active{
  background:var(--surface-active); color:var(--accent);
  box-shadow: inset 0 0 0 1px var(--glass-border-strong), 0 0 20px calc(var(--glow-op) * 18px) currentColor;
}
.nav-item .badge{
  position:absolute; top:2px; right:8px; min-width:14px; height:14px; padding:0 3px; border-radius:8px;
  background:var(--neon-danger); color:#fff; font-family:var(--font-mono); font-size:8.5px; font-weight:700;
  display:flex; align-items:center; justify-content:center; box-shadow:0 0 10px rgba(255,77,106,.7);
}
.nav-spacer{ flex:1; }

.topbar{
  grid-area:topbar; height:54px; display:flex; align-items:center; gap:10px; padding:0 16px;
  border-bottom:1px solid var(--glass-border); background:var(--glass);
}
.search-wrap{
  flex:1; max-width:480px; display:flex; align-items:center; gap:8px;
  background:var(--glass-strong); border:1px solid var(--glass-border); border-radius:var(--radius-md);
  padding:0 12px; height:34px; transition:border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.search-wrap:focus-within{ border-color:var(--neon-cyan); box-shadow:0 0 0 3px rgba(55,233,255,.15); }
.search-wrap svg{ width:14px; height:14px; color:var(--text-tertiary); flex-shrink:0; }
.search-wrap input{ border:none; outline:none; width:100%; font-size:12.5px; }
.search-hint{ font-family:var(--font-mono); font-size:9.5px; color:var(--text-tertiary); border:1px solid var(--glass-border); border-radius:4px; padding:2px 5px; flex-shrink:0; }
.topbar-spacer{ flex:1; }

.btn{
  display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 12px;
  border-radius:var(--radius-md); border:1px solid var(--glass-border); background:var(--glass-strong);
  font-family:var(--font-display); font-weight:500; font-size:12px; cursor:pointer;
  transition:background var(--dur-fast), border-color var(--dur-fast), transform var(--dur-fast), box-shadow var(--dur-fast);
}
.btn svg{ width:13px; height:13px; }
.btn:hover{ background:var(--surface-hover); border-color:var(--glass-border-strong); }
.btn:active{ transform:scale(.97); }
.btn-primary{
  background:linear-gradient(135deg, var(--neon-cyan), var(--neon-violet)); color:var(--accent-contrast); border:none;
  box-shadow:0 0 0 1px rgba(255,255,255,.14) inset, 0 6px 22px rgba(0,229,255,calc(var(--glow-op) * .5));
}
.btn-primary:hover{ filter:brightness(1.08); }
.icon-btn{
  width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-md);
  border:1px solid var(--glass-border); background:var(--glass-strong); cursor:pointer; color:var(--text-secondary);
}
.icon-btn:hover{ background:var(--surface-hover); color:var(--text-primary); }
.icon-btn svg{ width:15px; height:15px; }

.theme-pop{ position:relative; }
.theme-menu{
  position:absolute; top:42px; right:0; width:214px; padding:10px; border-radius:var(--radius-md);
  background:var(--glass-strong); backdrop-filter:blur(var(--blur)); border:1px solid var(--glass-border);
  box-shadow:0 20px 50px var(--scrim); display:none; flex-direction:column; gap:10px; z-index:50;
}
.theme-menu.open{ display:flex; }
.grp-label{ font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-tertiary); font-family:var(--font-display); margin-bottom:4px; }
.seg{ display:flex; background:var(--glass); border:1px solid var(--glass-border); border-radius:8px; padding:2px; gap:2px; }
.seg button{ flex:1; padding:6px 4px; border-radius:6px; font-size:10.5px; font-family:var(--font-display); font-weight:500; color:var(--text-secondary); cursor:pointer; }
.seg button.active{ background:var(--surface-active); color:var(--accent); }

.main{ grid-area:main; display:grid; grid-template-columns:1fr auto; overflow:hidden; }
.workspace{ overflow-y:auto; padding:16px 18px 22px; }
.ws-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.ws-title{ font-family:var(--font-display); font-weight:600; font-size:16.5px; }
.ws-sub{ color:var(--text-secondary); font-size:11.5px; margin-top:2px; }
.chip-row{ display:flex; gap:6px; }
.chip{
  font-family:var(--font-display); font-size:10.5px; font-weight:500; padding:5px 10px; border-radius:20px;
  border:1px solid var(--glass-border); color:var(--text-secondary); cursor:pointer; background:var(--glass);
}
.chip.active{ background:var(--surface-active); color:var(--text-primary); border-color:var(--glass-border-strong); }

.list{ display:flex; flex-direction:column; gap:8px; }
.row{
  border-radius:var(--radius-lg); padding:var(--pad-unit) 16px; cursor:pointer;
  background:var(--glass); border:1px solid var(--glass-border);
  transition:background var(--dur-fast), border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.row:hover{ background:var(--surface-hover); }
.row.selected{ border-color:var(--neon-cyan); box-shadow:0 0 0 1px rgba(55,233,255,.3), 0 0 30px rgba(55,233,255,calc(var(--glow-op) * .4)); }
.row-top{ display:flex; align-items:center; gap:12px; }
.file-icon{
  width:34px; height:34px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:var(--surface-active); color:var(--text-secondary); border:1px solid var(--glass-border);
}
.file-icon svg{ width:16px; height:16px; }
.row-info{ flex:1; min-width:0; }
.row-name{ font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:7px; }
.row-meta{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-secondary); margin-top:3px; display:flex; gap:9px; align-items:center; flex-wrap:wrap; }
.row-meta .dot{ width:3px; height:3px; border-radius:50%; background:var(--text-tertiary); }
.row-actions{ display:flex; gap:4px; flex-shrink:0; }

.status-chip{
  display:inline-flex; align-items:center; gap:4px; font-size:9.5px; font-family:var(--font-display); font-weight:600;
  padding:2px 7px 2px 6px; border-radius:20px; letter-spacing:.02em; border:1px solid transparent;
}
.status-chip svg{ width:9.5px; height:9.5px; }
.status-chip.ok{ background:rgba(60,255,196,.12); color:var(--neon-mint); border-color:rgba(60,255,196,.32); }
.status-chip.warn{ background:rgba(255,194,75,.12); color:var(--neon-amber); border-color:rgba(255,194,75,.32); }
.status-chip.danger{ background:rgba(255,77,106,.12); color:var(--neon-danger); border-color:rgba(255,77,106,.32); }
.status-chip.info{ background:rgba(55,233,255,.12); color:var(--neon-cyan); border-color:rgba(55,233,255,.32); }
.status-chip.neutral{ background:var(--surface-active); color:var(--text-secondary); border-color:var(--glass-border); }

.lanes{ display:flex; gap:2px; height:7px; border-radius:5px; overflow:hidden; background:var(--surface-active); margin-top:10px; }
.lane{ height:100%; flex:1; position:relative; overflow:hidden; background:var(--surface-active); border-radius:4px; }
.lane-fill{ position:absolute; inset:0 auto 0 0; height:100%; width:0%; transition:width 900ms linear; border-radius:4px; }
.lane-1 .lane-fill{ background:var(--neon-cyan); box-shadow:0 0 10px var(--neon-cyan); }
.lane-2 .lane-fill{ background:var(--neon-violet); box-shadow:0 0 10px var(--neon-violet); }
.lane-3 .lane-fill{ background:var(--neon-magenta); box-shadow:0 0 10px var(--neon-magenta); }
.lane-4 .lane-fill{ background:var(--neon-amber); box-shadow:0 0 10px var(--neon-amber); }
.lane-fill::after{ content:""; position:absolute; inset:0; background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent); width:40%; animation:shimmer 1.8s linear infinite; }
@keyframes shimmer{ from{ transform:translateX(-120%);} to{ transform:translateX(320%);} }
.row-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
.row-progress-txt{ font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); }

.details{ width:320px; border-left:1px solid var(--glass-border); background:var(--glass); overflow-y:auto; padding:16px; }
.details.collapsed{ width:0; padding:0; overflow:hidden; border-left:none; }
.details-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:14px; }
.details-title{ font-family:var(--font-display); font-weight:600; font-size:13.5px; line-height:1.35; word-break:break-word; }
.dsec{ margin-bottom:18px; }
.dsec-h{ font-family:var(--font-display); font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:9px; }
.kv{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--glass-border); font-size:11.5px; }
.kv:last-child{ border-bottom:none; }
.kv .k{ color:var(--text-secondary); }
.kv .v{ font-family:var(--font-mono); font-size:11px; text-align:right; }
.lane-legend{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
.lane-legend-row{ display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:10.5px; }
.lane-legend-row .sw{ width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.lane-legend-row .sp{ flex:1; color:var(--text-secondary); }
.safety-card{ border:1px solid var(--glass-border); border-radius:var(--radius-md); padding:11px; background:var(--glass-strong); }
.safety-card .h{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.safety-card .note{ font-size:11px; color:var(--text-secondary); line-height:1.5; }
.detail-actions{ display:flex; gap:8px; margin-top:8px; }
.detail-actions .btn{ flex:1; justify-content:center; }

.statusbar{
  grid-area:status; height:32px; display:flex; align-items:center; gap:16px; padding:0 16px;
  border-top:1px solid var(--glass-border); background:var(--glass);
  font-family:var(--font-mono); font-size:10.5px; color:var(--text-secondary);
}
.sb-item{ display:flex; align-items:center; gap:6px; }
.sb-item svg{ width:11px; height:11px; }
.sb-item b{ color:var(--text-primary); font-weight:600; }
.sb-dot{ width:6px; height:6px; border-radius:50%; background:var(--neon-mint); box-shadow:0 0 8px var(--neon-mint); }
.sb-spacer{ flex:1; }

.toast-region{ position:fixed; bottom:30px; right:30px; z-index:100; display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
.toast{
  background:var(--glass-strong); backdrop-filter:blur(var(--blur)); border:1px solid var(--glass-border); border-radius:var(--radius-md);
  padding:11px 13px; width:280px; display:flex; gap:10px; align-items:flex-start; box-shadow:0 20px 50px var(--scrim);
  animation:toast-in 260ms var(--ease);
}
@keyframes toast-in{ from{ opacity:0; transform:translateY(8px) scale(.98);} to{ opacity:1; transform:none;} }
.toast svg{ width:15px; height:15px; flex-shrink:0; margin-top:1px; }
.toast .tt{ font-size:12px; font-weight:600; margin-bottom:2px; }
.toast .td{ font-size:11px; color:var(--text-secondary); line-height:1.4; }
.toast-close{ margin-left:auto; cursor:pointer; color:var(--text-tertiary); flex-shrink:0; }

.empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:56px 20px; text-align:center; color:var(--text-secondary); }
.empty svg{ width:38px; height:38px; margin-bottom:12px; opacity:.5; }
.empty .et{ font-family:var(--font-display); font-weight:600; color:var(--text-primary); margin-bottom:4px; font-size:13.5px; }
.empty .ed{ font-size:11.5px; max-width:280px; }

::-webkit-scrollbar{ width:9px; height:9px; }
::-webkit-scrollbar-thumb{ background:var(--glass-border-strong); border-radius:8px; border:2px solid transparent; background-clip:padding-box; }
::-webkit-scrollbar-track{ background:transparent; }

.hint-bar{
  position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:5;
  font-family:var(--font-mono); font-size:10.5px; color:var(--text-tertiary);
  background:var(--glass); backdrop-filter:blur(var(--blur)); border:1px solid var(--glass-border);
  padding:5px 12px; border-radius:20px;
}
</style>
</head>
<body>
<div class="aurora"></div>

<div class="hint-bar">Mockup — window chrome is illustrative, not a real OS frame</div>

<div class="os-window glass">
  <!-- ============================= TITLE BAR ============================= -->
  <div class="titlebar">
    <div class="app-icon"></div>
    <div class="app-title">SmartDM</div>
    <div class="titlebar-spacer"></div>
    <div class="win-caption">
      <div class="cap-btn" id="minBtn" aria-label="Minimize">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><line x1="0" y1="5" x2="10" y2="5"/></svg>
      </div>
      <div class="cap-btn snap-wrap" id="maxBtn" aria-label="Maximize">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"/></svg>
        <div class="snap-flyout">
          <div class="snap-mini full" title="Maximize"><span></span></div>
          <div class="snap-mini split" title="Snap left/right"><span></span><span></span></div>
          <div class="snap-mini quad" title="Snap quad"><span></span><span></span><span></span><span></span></div>
        </div>
      </div>
      <div class="cap-btn close" id="closeBtn" aria-label="Close">
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><line x1="0" y1="0" x2="10" y2="10"/><line x1="10" y1="0" x2="0" y2="10"/></svg>
      </div>
    </div>
  </div>

  <div class="app-body">
    <!-- ============================= NAV RAIL ============================= -->
    <nav class="nav-rail" aria-label="Primary destinations">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-name">SMARTDM</div>
      </div>
      <button class="nav-item active" data-panel="downloads" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="lbl">Downloads</span>
        <span class="badge">4</span>
      </button>
      <button class="nav-item" data-panel="queue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span class="lbl">Queue</span>
      </button>
      <button class="nav-item" data-panel="scheduler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
        <span class="lbl">Scheduler</span>
      </button>
      <button class="nav-item" data-panel="media">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2.5"/><polygon points="10 9 15.5 12 10 15" fill="currentColor" stroke="none"/></svg>
        <span class="lbl">Media</span>
      </button>
      <button class="nav-item" data-panel="catalog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        <span class="lbl">Catalog</span>
      </button>
      <button class="nav-item" data-panel="safety">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.4 8 11 4.6-2.6 8-6 8-11V5l-8-3z"/></svg>
        <span class="lbl">Safety</span>
        <span class="badge" style="background:var(--neon-amber); color:#2A1B00;">1</span>
      </button>
      <div class="nav-spacer"></div>
      <button class="nav-item" data-panel="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9c.2.6.8 1 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"/></svg>
        <span class="lbl">Settings</span>
      </button>
    </nav>

    <!-- ============================= TOP BAR ============================= -->
    <header class="topbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search downloads — “video from last week under 200 MB”" aria-label="Search downloads">
        <span class="search-hint">Ctrl K</span>
      </div>
      <div class="topbar-spacer"></div>
      <button class="btn" id="openDialogBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add URL</button>
      <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Import batch</button>
      <div class="theme-pop">
        <button class="icon-btn" id="themeToggleBtn" aria-haspopup="true" aria-expanded="false" aria-label="Appearance settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>
        </button>
        <div class="theme-menu" id="themeMenu">
          <div>
            <div class="grp-label">Theme</div>
            <div class="seg" id="themeSeg">
              <button data-theme="dark" class="active">Dark</button>
              <button data-theme="light">Light</button>
              <button data-theme="hc">High contrast</button>
            </div>
          </div>
          <div>
            <div class="grp-label">Density</div>
            <div class="seg" id="densitySeg">
              <button data-density="comfortable" class="active">Comfortable</button>
              <button data-density="compact">Compact</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- ============================= MAIN ============================= -->
    <main class="main">
      <section class="workspace" id="workspace"></section>
      <aside class="details" id="details"></aside>
    </main>

    <!-- ============================= STATUS BAR ============================= -->
    <footer class="statusbar">
      <div class="sb-item"><span class="sb-dot"></span><b>Online</b></div>
      <div class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="19 12 12 19 5 12"/><line x1="12" y1="19" x2="12" y2="5"/></svg><b id="dlSpeed">18.4 MB/s</b></div>
      <div class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 12 5 19 12"/><line x1="12" y1="5" x2="12" y2="19"/></svg><b>0.1 MB/s</b></div>
      <div class="sb-item"><b>3</b>&nbsp;active · <b>1</b>&nbsp;queued</div>
      <div class="sb-spacer"></div>
      <div class="sb-item">Potato mode: off</div>
      <div class="sb-item">Gemini: disabled</div>
    </footer>
  </div>
</div>

<div class="toast-region" id="toastRegion"></div>

<script>
/* ============================= MOCK DATA ============================= */
const downloads = [
  { id:1, name:"Blender-4.3.0-linux-x64.tar.xz", ext:"archive", of:"412 MB", eta:"0:41", speed:"18.4 MB/s", state:"downloading", safety:"scanning", lanes:[62,58,71,49], host:"download.blender.org" },
  { id:2, name:"Quarterly-Report-Draft-v3.docx", ext:"doc", of:"2.1 MB", eta:"—", speed:"—", state:"completed", safety:"clean", lanes:[100], host:"drive.company.internal" },
  { id:3, name:"Podcast-Ep114-Master.mp3", ext:"audio", of:"96 MB", eta:"2:10", speed:"3.2 MB/s", state:"paused", safety:"clean", lanes:[40,38], host:"cdn.podhost.io" },
  { id:4, name:"win_setup_free_offer(1).exe", ext:"exe", of:"18.2 MB", eta:"—", speed:"—", state:"blocked", safety:"suspicious", lanes:[0], host:"getfreesetup-cdn.ru" },
  { id:5, name:"S02E06.1080p.WEB.mkv — queued", ext:"video", of:"1.4 GB", eta:"queued", speed:"—", state:"queued", safety:"unscanned", lanes:[0,0,0], host:"—" },
];
const laneClass = i => `lane-${(i%4)+1}`;
function fileIcon(ext){
  const icons = {
    archive:'<path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/>',
    doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/>',
    audio:'<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>',
    exe:'<path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M8.5 9.5 15.5 14.5"/><path d="M15.5 9.5 8.5 14.5"/>',
    video:'<rect x="2" y="4" width="20" height="16" rx="2.5"/><polygon points="10 9 15.5 12 10 15" fill="currentColor" stroke="none"/>',
  };
  return icons[ext] || icons.doc;
}
function safetyChip(s){
  const map = {
    clean:{cls:'ok',label:'No threats detected',icon:'<polyline points="20 6 9 17 4 12"/>'},
    scanning:{cls:'info',label:'Scanning…',icon:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/>'},
    suspicious:{cls:'danger',label:'Suspicious — blocked',icon:'<path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="9"/>'},
    unscanned:{cls:'neutral',label:'Unscanned',icon:'<circle cx="12" cy="12" r="9"/>'},
  };
  const m = map[s] || map.unscanned;
  return `<span class="status-chip ${m.cls}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${m.icon}</svg>${m.label}</span>`;
}
function stateChip(s){
  const map = {
    downloading:{cls:'info',label:'Downloading',icon:'<polyline points="19 12 12 19 5 12"/><line x1="12" y1="19" x2="12" y2="5"/>'},
    completed:{cls:'ok',label:'Completed',icon:'<polyline points="20 6 9 17 4 12"/>'},
    paused:{cls:'neutral',label:'Paused',icon:'<line x1="9" y1="5" x2="9" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/>'},
    blocked:{cls:'danger',label:'Blocked',icon:'<circle cx="12" cy="12" r="9"/><line x1="7" y1="17" x2="17" y2="7"/>'},
    queued:{cls:'neutral',label:'Queued',icon:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/>'},
  };
  const m = map[s];
  return `<span class="status-chip ${m.cls}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${m.icon}</svg>${m.label}</span>`;
}
const actionIcons = {
  pause:'<line x1="9" y1="5" x2="9" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/>',
  resume:'<polygon points="6 3 20 12 6 21 6 3"/>',
  cancel:'<circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/>',
  folder:'<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>',
  more:'<circle cx="12" cy="5" r="1.2"/><circle cx="12" cy="12" r="1.2"/><circle cx="12" cy="19" r="1.2"/>',
  quarantine:'<path d="M12 2 4 5v6c0 5 3.4 8.4 8 11 4.6-2.6 8-6 8-11V5l-8-3z"/>',
  delete:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
};
function actionBtn(kind){ return `<button class="icon-btn" title="${kind}" aria-label="${kind}" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${actionIcons[kind]}</svg></button>`; }
function rowActions(d){
  if(d.state==='downloading') return actionBtn('pause')+actionBtn('cancel');
  if(d.state==='paused') return actionBtn('resume')+actionBtn('cancel');
  if(d.state==='completed') return actionBtn('folder')+actionBtn('more');
  if(d.state==='blocked') return actionBtn('quarantine')+actionBtn('delete');
  return actionBtn('more');
}
function renderLanes(d){ return `<div class="lanes" aria-hidden="true">` + d.lanes.map((pct,i)=>`<div class="lane ${laneClass(i)}"><div class="lane-fill" style="width:${pct}%"></div></div>`).join('') + `</div>`; }
function renderDownloadsPanel(){
  const rows = downloads.map(d => `
    <div class="row" data-id="${d.id}" tabindex="0" role="button" aria-pressed="false">
      <div class="row-top">
        <div class="file-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${fileIcon(d.ext)}</svg></div>
        <div class="row-info">
          <div class="row-name">${d.name} ${stateChip(d.state)}</div>
          <div class="row-meta"><span>${d.host}</span><span class="dot"></span><span>${d.of}</span><span class="dot"></span><span>${d.speed}</span><span class="dot"></span><span>ETA ${d.eta}</span></div>
        </div>
        <div class="row-actions">${rowActions(d)}</div>
      </div>
      ${d.state!=='completed' ? renderLanes(d) : ''}
      ${d.state!=='completed' ? `<div class="row-foot"><span class="row-progress-txt">${d.lanes.length} parallel segment${d.lanes.length>1?'s':''}</span>${safetyChip(d.safety)}</div>` : `<div class="row-foot"><span class="row-progress-txt">Saved to ~/Downloads</span>${safetyChip(d.safety)}</div>`}
    </div>`).join('');
  return `
    <div class="ws-head">
      <div><div class="ws-title">Downloads</div><div class="ws-sub">5 items · 3 active, transferring at 18.4 MB/s</div></div>
      <div class="chip-row"><span class="chip active">All</span><span class="chip">Active</span><span class="chip">Completed</span><span class="chip">Blocked</span></div>
    </div>
    <div class="list">${rows}</div>`;
}
function renderGenericPanel(title, sub, iconPath, msg){
  return `
    <div class="ws-head"><div><div class="ws-title">${title}</div><div class="ws-sub">${sub}</div></div></div>
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg>
      <div class="et">${title} destination</div><div class="ed">${msg}</div>
    </div>`;
}
const panels = {
  downloads: renderDownloadsPanel,
  queue: () => renderGenericPanel('Queue', '1 waiting · concurrency limit 3', '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>', 'Reorder items by priority, set per-queue concurrency and bandwidth caps.'),
  scheduler: () => renderGenericPanel('Scheduler', 'No windows configured', '<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/>', 'Set start windows and recurring schedules so large transfers run off-peak automatically.'),
  media: () => renderGenericPanel('Media', 'yt-dlp + FFmpeg subsystem', '<rect x="2" y="4" width="20" height="16" rx="2.5"/><polygon points="10 9 15.5 12 10 15" fill="currentColor" stroke="none"/>', 'The SmartDM panel appears over YouTube thumbnails so you can inspect resolutions before downloading.'),
  catalog: () => renderGenericPanel('Catalog', '0 of 0 roots indexed', '<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>', 'Approve folders to index locally for duplicate detection and natural-language search.'),
  safety: () => renderGenericPanel('Safety', '1 item needs your review', '<path d="M12 2 4 5v6c0 5 3.4 8.4 8 11 4.6-2.6 8-6 8-11V5l-8-3z"/>', 'win_setup_free_offer(1).exe was flagged suspicious and blocked. Review it from Downloads.'),
  settings: () => renderGenericPanel('Settings', 'Appearance, privacy, network, AI', '<circle cx="12" cy="12" r="3"/>', 'Theme and density live in the picker up top. This destination holds consent controls and bandwidth defaults.'),
};
const workspace = document.getElementById('workspace');
const detailsEl = document.getElementById('details');
function renderDetails(d){
  if(!d){ detailsEl.classList.add('collapsed'); detailsEl.innerHTML=''; return; }
  detailsEl.classList.remove('collapsed');
  const laneLegend = d.lanes.map((pct,i)=>`<div class="lane-legend-row"><span class="sw" style="background:var(--neon-${['cyan','violet','magenta','amber'][i%4]})"></span><span class="sp">Segment ${i+1}</span><span>${Math.round(pct)}%</span></div>`).join('');
  detailsEl.innerHTML = `
    <div class="details-head"><div class="details-title">${d.name}</div>
      <button class="icon-btn" id="closeDetails" aria-label="Close details"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="dsec"><div class="dsec-h">Safety</div>
      <div class="safety-card"><div class="h">${safetyChip(d.safety)}</div>
      <div class="note">${d.safety==='suspicious' ? 'Local scanner flagged a double file-extension pattern. AI cannot override this verdict.' : d.safety==='scanning' ? 'Local antivirus engine is checking this file. Nothing is uploaded for this check.' : 'Local scanners found no known threats. This is not a guarantee of safety.'}</div></div>
      ${d.safety==='suspicious' ? `<div class="detail-actions"><button class="btn">Quarantine</button><button class="btn">Delete</button></div>` : ''}
    </div>
    <div class="dsec"><div class="dsec-h">Transfer</div>
      <div class="kv"><span class="k">Status</span><span class="v">${d.state}</span></div>
      <div class="kv"><span class="k">Downloaded</span><span class="v">${d.of}</span></div>
      <div class="kv"><span class="k">Speed</span><span class="v">${d.speed}</span></div>
      <div class="kv"><span class="k">ETA</span><span class="v">${d.eta}</span></div>
      <div class="kv"><span class="k">Source host</span><span class="v">${d.host}</span></div>
    </div>
    ${d.state!=='completed' ? `<div class="dsec"><div class="dsec-h">Segments (${d.lanes.length})</div>${renderLanes(d)}<div class="lane-legend">${laneLegend}</div></div>` : ''}
    <div class="dsec"><div class="dsec-h">Destination</div>
      <div class="kv"><span class="k">Suggested folder</span><span class="v">~/Downloads</span></div>
      <div class="kv"><span class="k">Rule matched</span><span class="v">by extension</span></div>
    </div>`;
  document.getElementById('closeDetails').addEventListener('click', ()=> selectRow(null));
}
let selectedId = null;
function selectRow(id){
  selectedId = id;
  document.querySelectorAll('.row').forEach(r=>{ const on = String(id)===r.dataset.id; r.classList.toggle('selected', on); r.setAttribute('aria-pressed', on); });
  renderDetails(downloads.find(d=>d.id===id));
}
function attachRowHandlers(){
  document.querySelectorAll('.row').forEach(r=>{
    r.addEventListener('click', ()=> selectRow(Number(r.dataset.id)));
    r.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); selectRow(Number(r.dataset.id)); } });
  });
}
let currentPanel = 'downloads';
function renderPanel(name){
  currentPanel = name;
  workspace.innerHTML = panels[name]();
  document.querySelectorAll('.nav-item').forEach(n=> n.classList.toggle('active', n.dataset.panel===name));
  if(name==='downloads'){ attachRowHandlers(); if(selectedId) selectRow(selectedId); } else { renderDetails(null); }
}
document.querySelectorAll('.nav-item').forEach(item=> item.addEventListener('click', ()=> renderPanel(item.dataset.panel)));

const themeBtn = document.getElementById('themeToggleBtn');
const themeMenu = document.getElementById('themeMenu');
themeBtn.addEventListener('click', e=>{ e.stopPropagation(); const open = themeMenu.classList.toggle('open'); themeBtn.setAttribute('aria-expanded', open); });
document.addEventListener('click', e=>{ if(!themeMenu.contains(e.target) && e.target!==themeBtn){ themeMenu.classList.remove('open'); themeBtn.setAttribute('aria-expanded','false'); } });
document.getElementById('themeSeg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b) return; document.documentElement.setAttribute('data-theme', b.dataset.theme); document.querySelectorAll('#themeSeg button').forEach(x=>x.classList.toggle('active', x===b)); });
document.getElementById('densitySeg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b) return; document.documentElement.setAttribute('data-density', b.dataset.density); document.querySelectorAll('#densitySeg button').forEach(x=>x.classList.toggle('active', x===b)); });

function tickLanes(){
  downloads.forEach(d=>{ if(d.state!=='downloading') return; d.lanes = d.lanes.map(p=> Math.min(100, p + Math.random()*6)); });
  if(currentPanel==='downloads'){
    const st = workspace.scrollTop;
    workspace.innerHTML = renderDownloadsPanel();
    workspace.scrollTop = st;
    attachRowHandlers();
    if(selectedId) selectRow(selectedId);
  }
}
setInterval(tickLanes, 1400);

function pushToast(title, body, kind='ok'){
  const region = document.getElementById('toastRegion');
  const el = document.createElement('div'); el.className='toast';
  const iconMap = {ok:'<polyline points="20 6 9 17 4 12"/>', warn:'<path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="9"/>'};
  el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="${kind==='ok'?'var(--neon-mint)':'var(--neon-amber)'}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${iconMap[kind]}</svg>
    <div><div class="tt">${title}</div><div class="td">${body}</div></div><button class="toast-close" aria-label="Dismiss">✕</button>`;
  el.querySelector('.toast-close').addEventListener('click', ()=> el.remove());
  region.appendChild(el); setTimeout(()=> el.remove(), 6000);
}
document.getElementById('minBtn').addEventListener('click', () => { if (window.javaBridge) window.javaBridge.onMinimize(); });
document.getElementById('closeBtn').addEventListener('click', () => { if (window.javaBridge) window.javaBridge.onClose(); });

// Window Dragging
const titlebar = document.querySelector('.titlebar');
let isDragging = false;
titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.cap-btn')) return; // Ignore clicks on window controls
    if (window.javaBridge) {
        isDragging = true;
        window.javaBridge.startDrag(e.clientX, e.clientY);
    }
});
document.addEventListener('mousemove', (e) => {
    if (isDragging && window.javaBridge) {
        window.javaBridge.performDrag(e.screenX, e.screenY);
    }
});
document.addEventListener('mouseup', () => {
    isDragging = false;
});
document.getElementById('openDialogBtn').addEventListener('click', () => {
    if (window.javaBridge) {
        window.javaBridge.onAddUrlClick();
    } else {
        pushToast('Add URL', 'See smartdm-download-dialog.html for the separate Add Download window.');
    }
});

renderPanel('downloads');
setTimeout(()=> pushToast('Download complete', 'Quarterly-Report-Draft-v3.docx saved to ~/Downloads'), 900);
setTimeout(()=> pushToast('File blocked', 'win_setup_free_offer(1).exe matched a suspicious pattern.', 'warn'), 2600);
</script>
