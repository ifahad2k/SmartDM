<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Linear Gradient for Segmented Arrow -->
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#BF00FF" />
    </linearGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="100%" height="100%" fill="#0D0E15" />

  <!-- Outer Tech Hexagon (represents the secure local profile / encrypted persistence) -->
  <polygon points="250,50 450,150 450,350 250,450 50,350 50,150" 
           fill="none" 
           stroke="#2A2D43" 
           stroke-width="8" />

  <!-- Segmented Download Arrow (Glowing) -->
  <g filter="url(#neonGlow)">
    <!-- Top Segment -->
    <path d="M 210 120 L 290 120 L 290 200 L 210 200 Z" 
          fill="none" stroke="url(#cyanPurple)" stroke-width="12" stroke-linejoin="round"/>
    <!-- Middle Segment -->
    <path d="M 210 220 L 290 220 L 290 280 L 210 280 Z" 
          fill="none" stroke="url(#cyanPurple)" stroke-width="12" stroke-linejoin="round"/>
    <!-- Arrowhead -->
    <path d="M 170 300 L 330 300 L 250 390 Z" 
          fill="url(#cyanPurple)" />
  </g>

  <!-- Connection Nodes (Windows & Linux platforms) -->
  <circle cx="250" cy="50" r="8" fill="#00FFFF" filter="url(#neonGlow)" />
  <circle cx="250" cy="450" r="8" fill="#BF00FF" filter="url(#neonGlow)" />
</svg>
